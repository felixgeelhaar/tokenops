name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version: "1.25"
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum out of sync; run 'go mod tidy'"
            exit 1
          fi
      - name: gofmt
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt issues:"
            echo "$fmt_out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.0
        with:
          version: v2.11.4
          args: --timeout=5m
      - name: proto-verify (skip if protoc missing)
        run: make proto-verify

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version: "1.25"
          cache: true
      - name: Test
        # PowerShell on Windows splits unquoted "./..." in a way that
        # makes Go think the package list is empty and a literal ".out"
        # arg leaks through. Forcing bash on every OS keeps argument
        # handling identical across the matrix.
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage
          path: coverage.out

  bench-gate:
    name: Bench gate
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version: "1.25"
          cache: true
      # Shared GitHub runners are noisy; loosen the threshold for CI.
      - name: Proxy p99 overhead gate
        env:
          TOKENOPS_BENCH_P99_MS: "200"
        run: go test -run TestProxyP99OverheadGate -count=1 -timeout 120s ./internal/proxy/

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version: "1.25"
          cache: true
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for bin in tokenops tokenopsd; do
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            go build -trimpath -ldflags "-s -w" \
              -o "dist/${bin}-${GOOS}-${GOARCH}${ext}" "./cmd/${bin}"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5.4.0 # v5.4.0
        with:
          go-version: "1.25"
          cache: true

      - uses: goreleaser/goreleaser-action@v6 # v6.3.0
        with:
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on felixgeelhaar/homebrew-tap.
          # goreleaser's brews: section consumes this to push the
          # updated Formula/tokenops.rb on every release.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

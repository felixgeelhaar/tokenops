name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      # checkout@v4 / setup-go@v5 / goreleaser-action@v6 still default
      # to Node 20, which GitHub removes from runners 2026-09-16. Force
      # Node 24 now (default from 2026-06-16 anyway) so the workflow
      # doesn't break when the runner drops Node 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5.4.0 # v5.4.0
        with:
          go-version: "1.25"
          cache: true

      - uses: goreleaser/goreleaser-action@v6 # v6.3.0
        with:
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on felixgeelhaar/homebrew-tap.
          # goreleaser's brews: section consumes this to push the
          # updated Formula/tokenops.rb on every release.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

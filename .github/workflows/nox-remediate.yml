name: Nox remediate

# Replaces Dependabot's "open a PR with the version bump" loop. Wraps
# nox-hq/nox-remediate-action: scans, runs `nox fix`, optionally
# verifies the test suite, and opens (or refreshes) a PR with the
# resulting upgrades.
#
# Only VULN-001 findings carrying a `fixed_in` advisory are eligible.
# Major-version bumps are off by default; flip include_major via the
# workflow_dispatch input when you want to pull them in too.
on:
  schedule:
    # 04:00 UTC daily — earlier than the security scan (06:00) so any
    # remediation PR is already open by the time the gate runs.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      include_major:
        description: "Apply major-version bumps too (off by default; review manually)."
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nox-remediate
  cancel-in-progress: true

jobs:
  remediate:
    name: Apply OSV upgrades
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          # Need full history for the diff inspection + signed-off-by.
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version: "1.25"
          cache: true

      - name: Run nox-remediate
        # The composite action installs nox, runs the scan, builds
        # the upgrade plan, applies it, runs the verify command,
        # and opens / refreshes a PR. Pinned to v1.0.0's commit SHA;
        # bump deliberately after reviewing the release notes.
        uses: nox-hq/nox-remediate-action@f7d6cc12bf27c9c871b9f0b87cec38e45c886a37 # v1.0.0
        with:
          path: .
          version: "0.9.5"
          include-major: ${{ inputs.include_major || 'false' }}
          # `nox fix` only touches the Go module by default. Run our
          # full make verify after the upgrade so we catch breaks
          # introduced by transitive bumps too. The action also
          # tidies go.mod for us.
          verify-cmd: "go test -count=1 ./... -timeout 240s"
          pr-branch-prefix: "nox/remediate"
          pr-title: "chore(deps): nox remediate"
          pr-labels: "dependencies,security,nox-remediation"
          pr-base: main

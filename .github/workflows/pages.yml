name: Pages

on:
  push:
    branches: [main]
    paths:
      - "web/docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Pinned actions still default to Node 20, which GitHub removes from
# runners 2026-09-16. Force Node 24 (the default from 2026-06-16) so
# workflows keep running when Node 20 disappears.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/docs/package-lock.json
      - name: Install
        working-directory: web/docs
        run: npm install
      - name: Build VitePress
        working-directory: web/docs
        env:
          DOCS_BASE: /tokenops/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

# Default pricing table — public list prices in USD per million tokens.
#
# This file is embedded into the tokenops binary and parsed by
# spend.DefaultTable(). It is the single place model rates live: adding a
# newly released model is a one-line edit here, no Go changes needed.
#
# Keys ending in "*" are prefix matches (e.g. "claude-fable-5*" covers
# "claude-fable-5" and suffixed variants like "claude-fable-5[1m]").
# cached_input_per_million is the cache-read rate; when omitted, cache
# reads bill at input_per_million.
#
# Operators on negotiated rates can layer overrides via a file with the
# same schema referenced from config (pricing.path) — see
# spend.TableWithOverrides.
currency: USD
rates:
  openai:
    "gpt-4o-mini*":
      input_per_million: 0.15
      output_per_million: 0.60
      cached_input_per_million: 0.075
    "gpt-4o*":
      input_per_million: 2.50
      output_per_million: 10.00
      cached_input_per_million: 1.25
    "gpt-4-turbo*":
      input_per_million: 10.00
      output_per_million: 30.00
    "gpt-3.5-turbo*":
      input_per_million: 0.50
      output_per_million: 1.50
    "o1*":
      input_per_million: 15.00
      output_per_million: 60.00

  anthropic:
    "claude-fable-5*":
      input_per_million: 10.00
      output_per_million: 50.00
      cached_input_per_million: 1.00
    "claude-opus-4-8*":
      input_per_million: 5.00
      output_per_million: 25.00
      cached_input_per_million: 0.50
    "claude-opus-4-7*":
      input_per_million: 5.00
      output_per_million: 25.00
      cached_input_per_million: 0.50
    "claude-opus-4-6*":
      input_per_million: 5.00
      output_per_million: 25.00
      cached_input_per_million: 0.50
    "claude-sonnet-5*":
      input_per_million: 2.00
      output_per_million: 10.00
      cached_input_per_million: 0.20
    "claude-sonnet-4-6*":
      input_per_million: 3.00
      output_per_million: 15.00
      cached_input_per_million: 0.30
    "claude-haiku-4-5*":
      input_per_million: 1.00
      output_per_million: 5.00
      cached_input_per_million: 0.10
    "claude-3-5-sonnet*":
      input_per_million: 3.00
      output_per_million: 15.00
      cached_input_per_million: 0.30
    "claude-3-5-haiku*":
      input_per_million: 0.80
      output_per_million: 4.00
      cached_input_per_million: 0.08

  # Mistral — large + medium families. Le Chat Pro routes through these
  # on the consumer subscription; cost recompute attaches per-token
  # price when the plan window is exceeded and metered billing kicks in.
  mistral:
    "mistral-large*":
      input_per_million: 2.00
      output_per_million: 6.00
    "mistral-medium*":
      input_per_million: 0.40
      output_per_million: 2.00
    "mistral-small*":
      input_per_million: 0.20
      output_per_million: 0.60
    "codestral*":
      input_per_million: 0.30
      output_per_million: 0.90

  gemini:
    "gemini-2.5-pro*":
      input_per_million: 1.25
      output_per_million: 10.00
      cached_input_per_million: 0.31
    "gemini-2.5-flash*":
      input_per_million: 0.30
      output_per_million: 2.50
      cached_input_per_million: 0.075
    "gemini-1.5-pro*":
      input_per_million: 1.25
      output_per_million: 5.00
    "gemini-1.5-flash*":
      input_per_million: 0.075
      output_per_million: 0.30

  # Cohere — https://cohere.com/pricing (2026-07). Longest-prefix match means
  # command-r-plus / command-r7b resolve before the broader command-r / command.
  cohere:
    "command-a*":
      input_per_million: 2.50
      output_per_million: 10.00
    "command-r-plus*":
      input_per_million: 2.50
      output_per_million: 10.00
    "command-r7b*":
      input_per_million: 0.0375
      output_per_million: 0.15
    "command-r*":
      input_per_million: 0.15
      output_per_million: 0.60
    "command*":
      input_per_million: 1.00
      output_per_million: 2.00

  # OpenAI-compatible upstreams. Public list prices in USD / million tokens
  # (captured 2026-07; verify against the vendor's pricing page — these drift,
  # and negotiated rates should be layered via config pricing.path).

  # Groq — https://groq.com/pricing (2026-07)
  groq:
    "llama-3.3-70b*":
      input_per_million: 0.59
      output_per_million: 0.79
    "llama-3.1-8b*":
      input_per_million: 0.05
      output_per_million: 0.08
    "llama-3*":
      input_per_million: 0.59
      output_per_million: 0.79
    "gemma2*":
      input_per_million: 0.20
      output_per_million: 0.20

  # DeepSeek — https://api-docs.deepseek.com/quick_start/pricing (2026-07).
  # cached_input_per_million is DeepSeek's cache-hit rate.
  deepseek:
    "deepseek-chat*":
      input_per_million: 0.27
      output_per_million: 1.10
      cached_input_per_million: 0.07
    "deepseek-reasoner*":
      input_per_million: 0.55
      output_per_million: 2.19
      cached_input_per_million: 0.14

  # xAI — https://docs.x.ai/docs/models (2026-07)
  xai:
    "grok-2*":
      input_per_million: 2.00
      output_per_million: 10.00
    "grok-3*":
      input_per_million: 3.00
      output_per_million: 15.00
    "grok-beta*":
      input_per_million: 5.00
      output_per_million: 15.00

  # Perplexity — https://docs.perplexity.ai/guides/pricing (2026-07). Token
  # rates only; Sonar also bills a per-request search fee not modelled here.
  perplexity:
    "sonar-pro*":
      input_per_million: 3.00
      output_per_million: 15.00
    "sonar-reasoning*":
      input_per_million: 1.00
      output_per_million: 5.00
    "sonar*":
      input_per_million: 1.00
      output_per_million: 1.00

  # Cerebras — https://cerebras.ai/pricing (2026-07)
  cerebras:
    "llama-3.3-70b*":
      input_per_million: 0.85
      output_per_million: 1.20
    "llama-3.1-8b*":
      input_per_million: 0.10
      output_per_million: 0.10

  # Fireworks, Together, and OpenRouter multiplex many third-party models
  # under namespaced names (e.g. "accounts/fireworks/models/…",
  # "meta-llama/Llama-3.3-70B-Instruct-Turbo", "anthropic/claude-…"), so a
  # static rate card cannot price them accurately — the true rate is the
  # underlying model's. Token counts are still metered; attach $ cost by
  # layering a pricing.path override keyed to the exact model names you use.

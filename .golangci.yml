version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - prealloc
    - nolintlint
  settings:
    errcheck:
      # Stdlib writes that practically cannot fail in our paths.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (*text/tabwriter.Writer).Flush
        - (io.Closer).Close
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        # exported + redefines-builtin-id intentionally off: Go 1.21
        # added max/min as builtins so locals named max trip the
        # latter, and the comment-required rule overstates the value
        # on internal-only declarations.
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive
          - gocritic
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/felixgeelhaar/tokenops

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

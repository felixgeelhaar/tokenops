version: 2
project_name: tokenops

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: tokenops
    binary: tokenops
    main: ./cmd/tokenops
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/felixgeelhaar/tokenops/internal/version.Version={{ .Version }}
      - -X github.com/felixgeelhaar/tokenops/internal/version.Commit={{ .Commit }}
      - -X github.com/felixgeelhaar/tokenops/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: tokenopsd
    binary: tokenopsd
    main: ./cmd/tokenopsd
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/felixgeelhaar/tokenops/internal/version.Version={{ .Version }}
      - -X github.com/felixgeelhaar/tokenops/internal/version.Commit={{ .Commit }}
      - -X github.com/felixgeelhaar/tokenops/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: ["tar.gz"]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - merge

release:
  github:
    owner: felixgeelhaar
    name: tokenops
  draft: false

# Automatically bump the felixgeelhaar/homebrew-tap formula on every
# tag push. Replaces the brittle sed-based update job in
# .github/workflows/release.yml that silently no-op'd when the formula
# schema drifted from the placeholder patterns it expected.
#
# Requires HOMEBREW_TAP_TOKEN — a PAT with `contents:write` on
# felixgeelhaar/homebrew-tap — exposed to the goreleaser step.
brews:
  - name: tokenops
    repository:
      owner: felixgeelhaar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/felixgeelhaar/tokenops"
    description: "Open-source operational intelligence layer for AI systems"
    license: "Apache-2.0"
    commit_author:
      name: github-actions
      email: github-actions@github.com
    commit_msg_template: "tokenops {{ .Tag }}"
    install: |
      bin.install "tokenops"
      bin.install "tokenopsd"
    test: |
      system "#{bin}/tokenops", "version"
      system "#{bin}/tokenopsd", "version"

id: tokenops
title: TokenOps
description: Open-source operational intelligence layer for AI systems. Real-time token optimization, inference observability, agent usage analytics, prompt intelligence, forecasting, governance, AI efficiency coaching across OpenAI Anthropic Gemini. Sits between clients/agents/workflows and frontier LLM providers.
features:
    - id: tokenops-proxy
      title: TokenOps Proxy
      description: Local proxy intercepting requests between clients and LLM providers. Foundation for all other components.
      requirements: []
    - id: optimization-engine
      title: Optimization Engine
      description: Reduces token waste in real time via compression deduplication retrieval pruning context trimming adaptive routing.
      requirements: []
    - id: observability-platform
      title: Observability Platform
      description: Token analytics spend tracking workflow attribution latency tracking efficiency scoring.
      requirements: []
    - id: coaching-engine
      title: Coaching Engine
      description: Replays expensive sessions generates optimized alternatives teaches prompt efficiency. Local models async batch analysis.
      requirements: []
    - id: forecasting-governance
      title: Forecasting and Governance
      description: Weekly limit tracking budget alerts usage forecasting anomaly detection.
      requirements: []
    - id: integrations
      title: Client Integrations
      description: First-party integrations across CLI ecosystem IDEs SDK ecosystem.
      requirements: []
    - id: cli
      title: TokenOps CLI
      description: Command-line interface for daemon management replay optimization analysis status coaching.
      requirements: []
    - id: dashboard
      title: Dashboard
      description: Vue web dashboard for live token usage spend attribution forecasts agent analytics optimization opportunities.
      requirements: []
    - id: data-telemetry
      title: Data Model and Telemetry
      description: Event schema for prompts workflows optimizations coaching. Local-first with optional cloud emission. OpenTelemetry compatible.
      requirements: []
    - id: security-privacy
      title: Security and Privacy
      description: Local-first self-hostable privacy-preserving. Opt-in cloud telemetry. Air-gapped deployment supported.
      requirements: []
    - id: operator-golden-path-+-wedge-kpi
      title: Operator Golden Path + Wedge KPI
      description: 'Add a clear operator-first onboarding path that proves value quickly: a 5-minute golden path from install to first measurable token insight, with explicit expected output and a wedge KPI definition in docs.'
      requirements: []
    - id: branch-protection-compliance-guardrail
      title: Branch Protection Compliance Guardrail
      description: Define and enforce a strict PR-only workflow for protected branches. Add repository guardrails and team runbook so AI/CLI automation never pushes directly to main. Include branch-protection compliance checks in contribution workflow.
      requirements: []
    - id: security-finding-signal-governance
      title: Security Finding Signal Governance
      description: 'Harden nox signal quality by formalizing a false-positive governance policy: classify scanner findings (real issue vs acceptable pattern), keep scoped excludes minimal, and require documented rationale + periodic review for every suppression path.'
      requirements: []
    - id: optimization-quality-evals-framework
      title: Optimization Quality Evals Framework
      description: Implement AI optimization evaluation harness with offline replay datasets and quality regression gates. Track task-success, regenerate rate, estimated token savings, and quality drift before enabling broader optimization defaults.
      requirements: []
    - id: operator-wedge-kpi-scorecard
      title: Operator Wedge KPI Scorecard
      description: 'Define a product wedge scorecard tied to operator outcomes: first-value time, token efficiency uplift, and spend attribution completeness. Publish metric definitions, baseline capture workflow, and rollout thresholds in docs + CLI output.'
      requirements: []
    - id: telemetry-contract-and-lineage-control
      title: Telemetry Contract and Lineage Control
      description: Add explicit data-contract and lineage docs for key event fields used across proxy, storage, OTLP, and dashboard. Include schema change policy, compatibility tests, and owner map for each telemetry contract.
      requirements: []
    - id: risk-based-test-coverage-uplift
      title: Risk-Based Test Coverage Uplift
      description: Introduce repository-level quality debt dashboard for low-coverage/high-risk packages (e.g., daemon entrypoints and integration surfaces). Add targeted tests and risk-ranked coverage goals rather than blanket percentage targets.
      requirements: []
    - id: rule-intelligence
      title: Rule Intelligence
      description: 'Treat operational rule artifacts (CLAUDE.md, AGENTS.md, repo instructions, MCP policies, Cursor rules, coding conventions) as first-class telemetry. Provide a Rule Engine that ingests rule sources, analyzes ROI (tokens saved, retries avoided, context reduction, latency impact, quality drift), detects conflicts and redundancy, compresses rule corpora into distilled behavioral representations, and dynamically injects only the relevant subset per request/workflow. Includes benchmarking harness for coding/workflow rule systems. Surfaces via CLI (tokenops rules analyze|conflicts|compress|inject|bench), proxy hooks, MCP server, and dashboard. Local-first, respects redaction, OTLP-emittable. Issue #12.'
      requirements: []
    - id: fix-rulesfs-walker:-tolerate-permission-denied-+-skip-unreadable-subtrees
      title: 'Fix rulesfs walker: tolerate permission-denied + skip unreadable subtrees'
      description: |
        ## Problem

        `internal/infra/rulesfs/source.go` `Discover()` walks the filesystem under the supplied root and bails on the first error any `filepath.WalkDir` callback returns. When the root is anywhere with read-restricted siblings (notably anywhere under `$HOME` on macOS — `~/Library/Saved Application State/...`, `~/Library/Containers/...`, etc.), the walk aborts before the loader ever sees the rule artifacts.

        Observed cases:

        - `tokenops rules analyze --root ~/.claude` → returns 0 documents even though `~/.claude/CLAUDE.md` exists. The walker enters one of the hidden sibling subtrees, hits an error, and halts.
        - `tokenops rules analyze --root ~` → exits non-zero with `permission denied: open ~/Library/Saved Application State/com.shure.motivmix.savedState`.

        ## Repro

        ```bash
        echo "# rules" > ~/.claude/CLAUDE.md
        tokenops rules analyze --root ~/.claude --repo-id home
        # expected: 1 document discovered
        # actual:   no rule artifacts found
        ```

        ## Root cause

        `Discover()` propagates every error from `filepath.WalkDir`'s callback. A single `EACCES` or `EPERM` from `os.Open` on a sibling subtree kills the whole walk. The existing hidden-dir skip (`base != ".cursor"` line in source.go) doesn't cover Library/Containers-style dirs without a leading dot.

        ## Fix

        In the `filepath.WalkDir` callback (and the `fs.WalkDir` branch above it):

        1. When the WalkDir-supplied `err` is non-nil and `errors.Is(err, fs.ErrPermission)`, log + skip:
           - If `d != nil && d.IsDir()` → return `fs.SkipDir` to skip the whole subtree.
           - Otherwise → return `nil` to skip the single file and continue.
        2. For non-permission errors, keep current behaviour (propagate) so genuine I/O failures still surface.
        3. Optionally: add a `Patterns`-aware short-circuit so a walker that's only looking for `CLAUDE.md` / `AGENTS.md` / `.cursor/...` doesn't bother descending into `Library/`, `node_modules/`, `vendor/` etc. — already half-implemented for the latter two; extend the skip list.

        ## Acceptance

        - `tokenops rules analyze --root ~/.claude` discovers `CLAUDE.md` and produces a non-empty document set.
        - `tokenops rules analyze --root ~` completes without exiting non-zero on permission errors; logs the skipped paths at debug level.
        - New unit test in `internal/infra/rulesfs/source_test.go` injects a synthetic `fs.FS` that returns `fs.ErrPermission` on a sibling dir; assert that the legitimate `CLAUDE.md` is still discovered.

        ## Surfaces affected

        - `tokenops rules analyze|conflicts|compress|inject|bench` CLI subcommands.
        - `tokenops_rules_*` MCP tools (same loader path).
        - `/api/rules/*` HTTP endpoints.

        ## References

        - Discovered while testing tokenops MCP integration in Claude Code / Desktop after `brew install felixgeelhaar/tap/tokenops` (v0.2.0).
        - Related: `internal/infra/rulesfs/source.go` lines ~57-104 (`Discover()`).
      requirements: []
    - id: first-run-activation-flow
      title: First-Run Activation Flow
      description: 'Activate new operators in under 5 minutes. Ship `tokenops init` wizard (idempotent: enables sqlite storage at $XDG_DATA_HOME or ~/.tokenops/db, default RBAC, audit on, rules root=$PWD, writes config), `tokenops demo` (seeds 7 days synthetic events so spend/burn/forecast/scorecard/top return populated data), structured `blockers[]` + `next_actions[]` fields in /healthz, /readyz, /version, and MCP status, and a disabled-subsystem error contract (`{error,hint}` instead of empty success when Storage/Rules/Providers disabled). Closes the time-to-value gap surfaced in v0.2.0 first-run review.'
      requirements: []
    - id: plan-based-cost-model
      title: Plan-Based Cost Model
      description: 'Support flat-rate subscription plans (Claude Max, Claude Code Pro, ChatGPT Plus/Pro, Cursor, GitHub Copilot, Cody) where per-token cost is zero but quota matters. Design: PromptEvent gains `CostSource` enum (metered|plan_included|trial), config gets `plans: {provider: plan_name}` map. Spend engine: when CostSource=plan_included, CostUSD=0 and event counts toward quota tracker instead. New metrics: plan_quota_consumed_pct, plan_headroom_days, plan_overage_risk. Dashboard + CLI surface plan headroom alongside metered cost. Backward compat: events without CostSource default to "metered". Requires per-plan quota config (input/output tokens/month, rate-limit windows). Initial plan catalog: claude-max, claude-pro, claude-code-max, gpt-plus, gpt-pro, gpt-team, copilot-individual, copilot-business, cursor-pro, cursor-business.'
      requirements: []
    - id: rate-limit-window-headroom
      title: Rate-Limit Window Headroom
      description: 'Most LLM subscriptions (Claude Max 5x/20x, Claude Pro, ChatGPT Plus/Team) publish rolling-window rate limits, not monthly token caps. Extend the plan model to track messages/requests per window (5h for Claude, 3h for ChatGPT, etc.) and emit a window-based headroom report alongside the existing monthly view. Split catalog: claude-max-5x + claude-max-20x replace generic claude-max; ChatGPT Plus + Team get message-per-window caps. HeadroomReport gains window_consumed, window_cap, window_pct, window_resets_at fields. CLI + MCP surface both metrics so operators see "67% of 5h window, resets in 1h42m" instead of "no monthly cap published". Sources: Anthropic Max plan docs, OpenAI Plus/Team rate-limit FAQ, dated 2026-05 snapshot URLs.'
      requirements: []
    - id: mcp-first-wedge:-session-budget-+-config-as-code
      title: 'MCP-First Wedge: Session Budget + Config-as-Code'
      description: 'Three-skill review converged: TokenOps targets wrong consumption surface (proxy traffic, but plan-based users go through Claude Code / Cursor MCP) and forces JSON-editing for config (Plans, Providers, Rules, OTel). The wedge bet is MCP-resident session observability + a config-as-code CLI primitive that replaces every text-edit-then-restart ritual. Ships: tokenops <subsystem> set verb pattern, MCP-side session traffic observer that counts Claude Code / Cursor MCP calls against plan windows, tokenops_session_budget MCP tool predicting next-2h headroom, structured error hints carrying exact next commands, customer-research scaffolding (interview script + tracker doc). Skips proxy work, optimizer expansion, dashboard polish until the wedge validates with 5 real users.'
      requirements: []
    - id: data-isolation-+-surface-polish
      title: Data Isolation + Surface Polish
      description: Five gaps surfaced from the full v0.7.1 demo. (1) Rules walker bails on permission-denied siblings under $HOME so analyze/conflicts/inject return null even when CLAUDE.md exists — pre-existing in-progress task. (2) Synthetic demo events mix with real proxy/MCP-session events in every analytics query; need source-tagging filter + a `--include-demo` opt-in. (3) Only plan_headroom + session_budget self-record session pings; the other 20 MCP tools don't, biasing the window count. Auto-wrap at registration so every tool call records. (4) 22 MCP tools surface flat with no curation; add tokenops_help that returns a "start here" subset. (5) Status/scorecard should expose real_vs_seeded counts so operators see signal vs synthetic ratio. Skips vendor /usage ingestion (waits for customer-discovery interview data).
      requirements: []
    - id: signal-quality-+-activation-honesty
      title: Signal Quality + Activation Honesty
      description: 'Four-skill consensus from the v0.8.1 review. UX, Product, AI, GTM converged on a single verdict: ship trust signals + activation honesty, then run customer interviews. Concretely: (1) every session_budget / plan_headroom response carries signal_quality {level, source, caveat, upgrade_paths} so operators see it is an MCP-ping heuristic, not real Claude turn data; (2) empty-state scorecard replaces F grade with a first-week activation checklist when no KPI is computed; (3) synthetic-data banner attaches to cost/headroom responses when source=demo dominates the window; (4) MCP serve file-watches config.yaml and hot-reloads on plan/provider changes, eliminating the only remaining "leave the product to apply" step; (5) deprecated claude-max alias migration shim so users pasting old docs see a renamed-to warning instead of an error; (6) outreach plan doc: 90-second Loom + Show HN + Discord cross-post + 25 founder DMs landing 10 real users by end-of-week. Customer interviews remain operator work (Roady tracks the task).'
      requirements: []
    - id: plan-auto-detection
      title: Plan Auto-Detection
      description: 'Instead of asking users to memorise catalog names (`tokenops plan set anthropic claude-max-20x`), detect their subscriptions automatically. Sniff Claude Code config (~/.claude*, claude_desktop_config.json), Cursor config, GitHub Copilot CLI status, common AI env vars (ANTHROPIC_API_KEY → likely API user; CLAUDE_CODE_OAUTH presence → likely Max plan; CURSOR_API_KEY → Cursor Pro/Business). Run during `tokenops init` as an interactive wizard: "I see Claude Code installed. Are you on Max 5x, Max 20x, or Pro?" Default-detect known signatures (e.g. Claude Code''s $CLAUDE_CODE_ENTITLEMENT or session JWT scope) and bind without prompting when high-confidence. Fall through to a single-question prompt when uncertain. Bonus: rerun on `tokenops doctor` to catch new subscriptions added later. Acceptance: `tokenops init` correctly auto-binds at least Claude Max + Cursor Pro for a user who has both installed.'
      requirements: []
    - id: coaching-llm-auto-routing
      title: Coaching LLM Auto-Routing
      description: 'Wire `llm.Backend` into `coaching.Pipeline` AND auto-pick the cheapest in-plan model for each configured plan. Decision table: Claude Max/Pro user → route coaching through their Anthropic session with `claude-haiku-4.5` (cheapest + included in plan, no extra cost); ChatGPT Plus/Pro/Team → route via gpt-5-mini equivalent through their account; GitHub Copilot user → use Copilot''s bundled cheap model; Cursor user → use Cursor''s bundled tier; no plan configured → fall back to local Ollama (llama3.2:3b default) if reachable; else disable coaching summaries with a one-line note ("coaching is heuristic-only — bind a plan or run Ollama for natural-language summaries"). Add `config.Coaching.LLM` section with explicit override (`auto` | `local:<model>` | `cloud:<provider>:<model>`). CLI: `tokenops coach set-model auto|local:llama3.2|cloud:anthropic:claude-haiku-4.5`. Hot-reload picks up changes. Acceptance: user with `plans.anthropic=claude-max-20x` gets coaching summaries generated through their Claude session with haiku as the cheapest model, with no separate API key configured.'
      requirements: []
    - id: interactive-mcp-ui-rendering
      title: Interactive MCP UI Rendering
      description: 'Today MCP tool responses are plain-text JSON. Three rendering tiers, ship in order: (1) Markdown summary + JSON appendix for every cost/headroom response so Desktop/Code/Cursor render styled tables and code blocks instead of brace soup; (2) Inline SVG sparklines for burn-rate and window-headroom charts returned as ResourceContent with MimeType=image/svg+xml — most MCP clients embed SVG inline today; (3) Interactive Vue+D3 dashboard returned as text/html ResourceContent — experimental, depends on client iframe support (Claude Desktop''s evolving UI app spec, Cursor''s panel). Build the Vue app under web/dashboard/ (already exists), bundle as a single-file HTML blob, serve via tokenops_dashboard MCP tool. Charts to ship first: window-burn sparkline, plan-quota gauge, real-vs-synthetic ratio donut. Acceptance: tokenops_session_budget renders as a styled markdown table in Claude Desktop; tokenops_dashboard returns an interactive D3 chart in clients that support html resources.'
      requirements: []
constraints: []
